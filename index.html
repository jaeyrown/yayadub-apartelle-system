<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yayadub Apartelle - Log In</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Base Resets */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Use the primary brand color in the gradient */
            background: linear-gradient(135deg, #84f032 35%, #f7faf5 55%, #f5e82f 80%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
            /* Flex to center the SVG and text horizontally */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo h1 {
            color: #333;
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 5px;
            /* Flex to align the SVG and text vertically in the h1 */
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .logo p {
            color: #777;
            font-size: 0.95em;
        }

        /* --- Custom Architectural "Y" SVG Styling --- */
        #architecturalY {
            width: 50px; /* Control the logo size here */
            height: auto;
            /* Default color is the brand green */
            fill: none;
            stroke: #53c431;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Form Styling */
        .form-group {
            position: relative;
            margin-bottom: 20px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 45px 15px 20px; /* Right padding for icons */
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #fdfdfd;
        }

        .form-group input:focus {
            outline: none;
            /* Use brand green for focus border */
            border-color: #53c431;
            background: white;
            box-shadow: 0 0 0 4px rgba(83, 196, 49, 0.1);
        }

        .form-group i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            pointer-events: none;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            /* Primary gradient uses the brand colors */
            background: linear-gradient(135deg, #53c431 0%, #3a9121 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(83, 196, 49, 0.3);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .forgot-password {
            /* Secondary brand color (purple) for forgot password */
            color: #764ba2;
            text-decoration: none;
            font-weight: 600;
        }

        /* Divider & Socials */
        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
            color: #bbb;
            font-size: 13px;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: 1px; background: #eee;
            z-index: 1;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            z-index: 2;
        }

        .social-login {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid #e1e5e9;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            transition: 0.2s;
        }

        .social-btn:hover { background: #f8f9fa; border-color: #53c431; }

        .register-link { text-align: center; font-size: 14px; color: #666; }
        /* Create account link uses brand green */
        .register-link a { color: #53c431; font-weight: 700; text-decoration: none; }

        /* Status Messages */
        .status-msg {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            border-left: 4px solid;
        }
        .error { background: #fff5f5; color: #c53030; border-color: #c53030; }
        .success { background: #f0fff4; color: #2f855a; border-color: #2f855a; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
    <h1><svg id="architecturalY" viewBox="0 0 50 60">
            <path d="M 25 35 L 25 55"/>
            <path d="M 5 10 L 15 30 L 25 35 L 35 30 L 45 10"/>
            <path stroke-width="2" d="M 18 45 H 32"/>
            <path stroke-width="2" d="M 18 50 H 32"/>
        </svg>ayadub</h1>
    <p>Sign in to manage your bookings</p>
</div>

        <div id="statusBox" class="status-msg"></div>

        <form id="loginForm">
            <div class="form-group">
                <input type="email" id="email" placeholder="Email Address" required>
                <i class="fas fa-envelope"></i>
            </div>

            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
                <i class="fas fa-lock"></i>
            </div>

            <div class="form-options">
                <label style="cursor:pointer"><input type="checkbox"> Remember me</label>
                <a href="#" class="forgot-password">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn" id="submitBtn">Sign In</button>
        </form>

        <div class="divider"><span>OR CONTINUE WITH</span></div>

        <div class="social-login">
            <button class="social-btn"><i class="fab fa-google"></i> Google</button>
            <button class="social-btn"><i class="fab fa-facebook-f"></i> Facebook</button>
        </div>

        <div class="register-link">
            Don't have an account? <a href="#">Create one</a>
        </div>
    </div>

    <script>
        const demoUsers = {
            'admin@yayadub.com': 'admin123',
            'tenant@yayadub.com': 'tenant123'
        };

        const loginForm = document.getElementById('loginForm');
        const statusBox = document.getElementById('statusBox');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Reset button state
            submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Checking...';
            submitBtn.disabled = true;

            setTimeout(() => {
                if (demoUsers[email] && demoUsers[email] === password) {
                    statusBox.className = 'status-msg success';
                    statusBox.textContent = 'Success! Redirecting to dashboard...';
                    statusBox.style.display = 'block';
                    
                    localStorage.setItem('user', email);
                    
                    setTimeout(() => {
                        // Crucial part: Redirection logic
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    statusBox.className = 'status-msg error';
                    statusBox.textContent = 'Invalid email or password.';
                    statusBox.style.display = 'block';
                    submitBtn.innerHTML = 'Sign In';
                    submitBtn.disabled = false;
                }
            }, 800);
        });
    </script>
</body>
</html>
