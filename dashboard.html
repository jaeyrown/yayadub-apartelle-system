<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yayadub Apartelle - Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-green: #53c431;
            --brand-purple: #764ba2;
            --bg-gray: #f4f7f6;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-gray);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            padding: 30px 20px;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 50px;
            text-decoration: none;
        }

        #logoIcon {
            width: 35px;
            stroke: var(--primary-green);
            stroke-width: 5;
            fill: none;
        }

        .nav-links { list-style: none; }
        .nav-item { margin-bottom: 15px; }
        .nav-link {
            text-decoration: none;
            color: #555;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            border-radius: 12px;
            transition: 0.3s;
            font-weight: 500;
        }

        .nav-link:hover, .nav-link.active {
            background: var(--primary-green);
            color: white;
        }

        /* Main Content Area */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 40px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .user-greeting h1 { color: #333; font-size: 1.8em; }
        .user-greeting p { color: #777; }

        /* Stats Cards Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .icon-box {
            width: 55px;
            height: 55px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
        }

        .green-box { background: rgba(83, 196, 49, 0.1); color: var(--primary-green); }
        .purple-box { background: rgba(118, 75, 162, 0.1); color: var(--brand-purple); }

        .card-info h3 { font-size: 0.9em; color: #888; margin-bottom: 5px; }
        .card-info .value { font-size: 1.5em; font-weight: 700; color: #333; }

        .logout-btn {
            margin-top: auto;
            color: #e74c3c;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo">
            <svg id="logoIcon" viewBox="0 0 50 60">
                <path d="M 25 35 L 25 55"/>
                <path d="M 5 10 L 15 30 L 25 35 L 35 30 L 45 10"/>
                <path stroke-width="2" d="M 18 45 H 32"/>
                <path stroke-width="2" d="M 18 50 H 32"/>
            </svg>
            <h2 style="color: #333;">ayadub</h2>
        </div>

        <ul class="nav-links">
            <li class="nav-item"><a href="#" class="nav-link active"><i class="fas fa-home"></i> Overview</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-bed"></i> Rooms</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-users"></i> Tenants</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-file-invoice-dollar"></i> Payments</a></li>
        </ul>

        <div class="logout-btn" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Sign Out
        </div>
    </aside>

    <main class="main-content">
        <header>
            <div class="user-greeting">
                <h1>Welcome Back!</h1>
                <p>Hello, <span id="usernameDisplay" style="color: var(--primary-green); font-weight: bold;">User</span>. Here's your apartelle summary.</p>
            </div>
            <div class="actions">
                <i class="fas fa-bell" style="font-size: 1.3em; color: #bbb; cursor: pointer;"></i>
            </div>
        </header>

        <div class="stats-grid">
            <div class="card">
                <div class="icon-box green-box"><i class="fas fa-door-open"></i></div>
                <div class="card-info">
                    <h3>Available Units</h3>
                    <div class="value">8 Rooms</div>
                </div>
            </div>
            <div class="card">
                <div class="icon-box purple-box"><i class="fas fa-user-friends"></i></div>
                <div class="card-info">
                    <h3>Current Tenants</h3>
                    <div class="value">24 Active</div>
                </div>
            </div>
            <div class="card">
                <div class="icon-box green-box"><i class="fas fa-calendar-check"></i></div>
                <div class="card-info">
                    <h3>Pending Bookings</h3>
                    <div class="value">5 Requests</div>
                </div>
            </div>
        </div>
        
        <div style="margin-top: 40px; padding: 100px; border: 2px dashed #ddd; border-radius: 20px; text-align: center; color: #aaa;">
            <i class="fas fa-chart-line" style="font-size: 3em; margin-bottom: 10px;"></i>
            <p>Main analytics and booking tables will go here.</p>
        </div>
    </main>

    <script>
        // Check if user is logged in
        window.onload = function() {
            const user = localStorage.getItem('user');
            if (!user) {
                // Not logged in? Go back to login
                window.location.href = 'index.html'; 
            } else {
                // Show the name before the '@' sign
                document.getElementById('usernameDisplay').textContent = user.split('@')[0];
            }
        };

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
